name: habit_tracker
description: "A beautiful habit tracker app with streaks, analytics, and reminders."
publish_to: 'none'

version: 1.0.7+7

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  flutter_local_notifications: ^17.2.0
  fl_chart: ^0.66.2
  uuid: ^4.5.1
  intl: ^0.19.0
  table_calendar: ^3.1.2
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2
  shared_preferences: ^2.3.2
  home_widget: ^0.6.0
  package_info_plus: ^9.0.0
  flutter_heatmap_calendar: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/images/app_icon.png"
